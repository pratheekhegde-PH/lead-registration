<!-- Simple Micro-interaction Script -->
<script>
        // Update current timestamp
        function updateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: true 
            };
            const timeEl = document.getElementById('timestamp');
            if(timeEl) timeEl.value = now.toLocaleDateString('en-US', options);
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // Custom Dropdown Logic
        const budgetTrigger = document.getElementById('budgetDropdownTrigger');
        const budgetMenu = document.getElementById('budgetDropdownMenu');
        const budgetLabel = document.getElementById('budgetValueLabel');
        const budgetHiddenInput = document.getElementById('budget');
        const budgetChevron = document.getElementById('budgetChevron');
        const budgetOptionsList = document.getElementById('budgetOptionsList');

        const budgetOptionsData = {
            'rent': [
                { value: '45k+', text: '45,000+' },
                { value: '55k+', text: '55,000+' },
                { value: '70k+', text: '70,000+' },
                { value: '1l+', text: '1 Lakh +' }
            ],
            'resale': [
                { value: '1cr+', text: '1 Cr+' },
                { value: '2cr+', text: '2 Cr+' },
                { value: '3cr+', text: '3 Cr+' },
                { value: '5cr+', text: '5 Cr+' },
                { value: '10cr+', text: '10 Cr+' }
            ],
            'buy': [
                { value: '1cr+', text: '1 Cr+' },
                { value: '2cr+', text: '2 Cr+' },
                { value: '3cr+', text: '3 Cr+' },
                { value: '5cr+', text: '5 Cr+' },
                { value: '10cr+', text: '10 Cr+' }
            ],
            'default': [
                { value: '1cr+', text: '1 Cr+' },
                { value: '2cr+', text: '2 Cr+' },
                { value: '3cr+', text: '3 Cr+' },
                { value: '5cr+', text: '5 Cr+' },
                { value: '10cr+', text: '10 Cr+' }
            ]
        };

        function toggleDropdown() {
            const isOpen = !budgetMenu.classList.contains('hidden');
            if (isOpen) {
                closeDropdown();
            } else {
                openDropdown();
            }
        }

        function openDropdown() {
            budgetMenu.classList.remove('hidden');
            budgetChevron.classList.add('rotate-180');
        }

        function closeDropdown() {
            budgetMenu.classList.add('hidden');
            budgetChevron.classList.remove('rotate-180');
        }

        function selectOption(value, text) {
            budgetLabel.textContent = text;
            budgetLabel.classList.remove('text-on-surface-variant');
            budgetLabel.classList.add('text-on-surface');
            budgetHiddenInput.value = value;
            closeDropdown();
        }

        function updateBudgetUI(intent) {
            const options = budgetOptionsData[intent] || budgetOptionsData['default'];
            budgetOptionsList.innerHTML = '';
            
            // Add "Select Budget" as first option reset
            const defaultOpt = document.createElement('div');
            defaultOpt.className = 'px-4 py-3 text-sm text-on-surface-variant hover:bg-mist/10 cursor-pointer transition-colors';
            defaultOpt.textContent = 'Select Budget';
            defaultOpt.onclick = () => selectOption('', 'Select Budget');
            budgetOptionsList.appendChild(defaultOpt);

            options.forEach(opt => {
                const item = document.createElement('div');
                item.className = 'px-4 py-3 text-sm text-on-surface hover:bg-mist/10 cursor-pointer transition-colors font-medium';
                item.textContent = opt.text;
                item.onclick = () => selectOption(opt.value, opt.text);
                budgetOptionsList.appendChild(item);
            });

            // Reset selection when intent changes
            budgetLabel.textContent = 'Select Budget';
            budgetLabel.classList.add('text-on-surface-variant');
            budgetHiddenInput.value = '';
        }

        budgetTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown();
        });

        document.addEventListener('click', (e) => {
            if (!budgetMenu.contains(e.target) && !budgetTrigger.contains(e.target)) {
                closeDropdown();
            }
        });

        // Intent Logic
        const intentRadios = document.querySelectorAll('input[name="primaryIntent"]');
        intentRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                updateBudgetUI(e.target.value);
            });
        });

        // Initialize with default UI
        updateBudgetUI(''); 

        // ─── SHEET ENDPOINT ───────────────────────────────────────────────
        // Paste your deployed Apps Script URL here after following setup steps
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbznrTqcQpf-pdVB4lByi0nCBzOU7Qx5qV3bBF2DiB-swQHcfv7NeswVToA32VAf42-YyA/exec';
        // ──────────────────────────────────────────────────────────────────

        document.getElementById('leadRegistrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.classList.add('opacity-80');
            btn.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></span> Processing...</span>';

            const leadId  = document.getElementById('leadId').value || 'CA-2026-001';
            const payload = {
                leadId,
                timestamp:    document.getElementById('timestamp').value,
                cpName:       document.getElementById('cpName').value,
                cpMobile:     document.getElementById('cpMobile').value,
                cpEmail:      document.getElementById('cpEmail').value,
                intent:       document.querySelector('input[name="primaryIntent"]:checked')?.value || '',
                leadName:     document.getElementById('leadName').value,
                leadMobile:   document.getElementById('leadMobile').value,
                project:      document.getElementById('project').value,
                propertyType: document.getElementById('propertyType').value,
                budget:       document.getElementById('budget').value,
                bhk:          document.querySelector('input[name="bhk"]:checked')?.value || '',
                requirements: document.getElementById('requirement').value,
            };

            const submit = () =>
                window.location.href = 'success.html?id=' + encodeURIComponent(leadId);

            if (!SHEET_URL || SHEET_URL === 'YOUR_APPS_SCRIPT_URL') {
                // Script not yet configured — go straight to success
                setTimeout(submit, 1500);
                return;
            }

            fetch(SHEET_URL, {
                method:  'POST',
                mode:    'no-cors',               // Apps Script requires no-cors
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload),
            })
            .finally(submit);                     // redirect regardless of network result
        });
    </script>
