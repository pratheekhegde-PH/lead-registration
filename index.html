<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Lead Registration | Century Advantage</title>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary":            "#6440A2",
          "accent":             "#F9685B",
          "heritage":           "#FCFFC8",
          "mist":               "#A1D2F2",
          "on-surface":         "#0b1c30",
          "on-surface-variant": "#4a4550",
          "outline-variant":    "#ccc3d2",
        },
        fontFamily: {
          "headline": ["Hanken Grotesk", "sans-serif"],
          "body":     ["Nunito Sans",    "sans-serif"],
        },
      }
    }
  }
</script>
<style>
  body { font-family: 'Nunito Sans', sans-serif; }
  h1,h2,h3,.font-headline { font-family: 'Hanken Grotesk', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .panel-enter { animation: panelIn .25s ease-out both; }
  @keyframes panelIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236440A2' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right .75rem center; background-size:1.25rem; }
</style>
</head>
<body class="text-on-surface min-h-screen flex flex-col bg-white">

<!-- Header -->
<header class="bg-primary sticky top-0 z-50 shadow-md">
  <nav class="grid grid-cols-3 items-center w-full px-4 md:px-6 h-16">
    <div class="flex justify-start">
      <img alt="Century Advantage" class="h-10 w-auto object-contain" src="/logo/century-advantage-all-white.png">
    </div>
    <div class="flex justify-center">
      <span class="text-white font-bold border-b-2 border-accent pb-1 text-sm">Registration</span>
    </div>
    <div class="flex justify-end">
      <button class="hidden md:flex items-center gap-1.5 text-white hover:text-accent transition-colors font-semibold text-sm">
        <span class="material-symbols-outlined text-[18px]">help_outline</span>Support
      </button>
    </div>
  </nav>
</header>

<!-- Main -->
<main class="flex-grow flex flex-col items-center py-8 px-4 relative overflow-hidden">
  <div class="absolute -left-20 top-20 w-64 h-64 bg-[#A1D2F2]/20 rounded-full blur-3xl -z-10 pointer-events-none"></div>
  <div class="absolute -right-20 bottom-20 w-80 h-80 bg-[#F9685B]/8 rounded-full blur-3xl -z-10 pointer-events-none"></div>

  <!-- Stepper -->
  <div class="w-full max-w-[600px] mb-8 flex items-center justify-between">
    <div class="flex flex-col items-center gap-1.5">
      <div id="sc1" class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm shadow-lg transition-all duration-300">1</div>
      <span id="sl1" class="text-xs font-bold text-primary uppercase tracking-tighter">Lead Info</span>
    </div>
    <div id="con1" class="flex-grow h-[2px] mx-3 mb-5 bg-primary/20 transition-all duration-500"></div>
    <div class="flex flex-col items-center gap-1.5">
      <div id="sc2" class="w-10 h-10 rounded-full bg-white border-2 border-primary/20 text-on-surface-variant flex items-center justify-center font-bold text-sm transition-all duration-300">2</div>
      <span id="sl2" class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Review</span>
    </div>
    <div id="con2" class="flex-grow h-[2px] mx-3 mb-5 bg-primary/20 transition-all duration-500"></div>
    <div class="flex flex-col items-center gap-1.5">
      <div id="sc3" class="w-10 h-10 rounded-full bg-white border-2 border-primary/20 text-on-surface-variant flex items-center justify-center font-bold text-sm transition-all duration-300">3</div>
      <span id="sl3" class="text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Success</span>
    </div>
  </div>

  <!-- ── STEP 1: FORM ── -->
  <section id="step1" class="panel-enter w-full max-w-[600px] bg-white rounded-2xl shadow-[0_10px_40px_rgba(100,64,162,0.10)] border border-primary/5 overflow-hidden">

    <div class="bg-primary px-6 md:px-8 py-6">
      <h1 class="text-2xl font-headline font-bold text-white">Register New Lead</h1>
      <p class="text-white/70 text-sm mt-0.5">Fill in the prospect details to start the sales journey.</p>
    </div>

    <div class="px-6 md:px-8 pt-6 pb-8 space-y-5">

      <!-- CP Setup Banner (one-time) -->
      <div id="cpSetup" class="hidden">
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-5 space-y-4">
          <p class="text-xs font-bold text-amber-700 uppercase tracking-wider flex items-center gap-1.5">
            <span class="material-symbols-outlined text-[15px]" style="font-variation-settings:'FILL' 1">info</span>
            One-time identity setup
          </p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-on-surface-variant">Your Name *</label>
              <input id="sName" type="text" placeholder="Full name"
                class="border border-outline-variant rounded-lg px-3 py-2.5 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-semibold text-on-surface-variant">Mobile *</label>
              <input id="sMobile" type="tel" placeholder="10-digit number"
                class="border border-outline-variant rounded-lg px-3 py-2.5 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-on-surface-variant">Work Email *</label>
            <input id="sEmail" type="email" placeholder="you@example.com"
              class="border border-outline-variant rounded-lg px-3 py-2.5 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
          </div>
          <button id="saveCpBtn" type="button"
            class="h-10 bg-primary text-white text-sm font-bold rounded-lg px-5 hover:bg-primary/90 transition-all">
            Save &amp; Continue
          </button>
        </div>
      </div>

      <!-- CP Identity Strip -->
      <div id="cpStrip" class="hidden"></div>

      <!-- Lead ID + Timestamp -->
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-bold uppercase tracking-wider text-primary/60">Lead ID</label>
          <input id="leadId" type="text" readonly
            class="bg-mist/10 border border-mist/30 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant cursor-not-allowed">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-[11px] font-bold uppercase tracking-wider text-primary/60">Date &amp; Time</label>
          <input id="timestamp" type="text" readonly
            class="bg-mist/10 border border-mist/30 rounded-lg px-3 py-2.5 text-sm text-on-surface-variant cursor-not-allowed">
        </div>
      </div>

      <hr class="border-outline-variant/30">

      <!-- Lead Form -->
      <form id="leadForm" novalidate class="space-y-5">

        <h2 class="text-[11px] font-bold text-accent uppercase tracking-widest flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-accent inline-block"></span>Lead Information
        </h2>

        <!-- Intent -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-on-surface">Primary Intent <span class="text-accent">*</span></label>
          <div class="grid grid-cols-2 gap-3">
            <label class="cursor-pointer">
              <input class="peer hidden" name="primaryIntent" type="radio" value="rent">
              <div class="flex flex-col items-center justify-center p-4 border-2 border-outline-variant rounded-xl
                          peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary
                          text-on-surface-variant hover:bg-mist/5 transition-all">
                <span class="material-symbols-outlined text-2xl mb-1">key</span>
                <span class="font-headline font-semibold text-sm">Rent</span>
              </div>
            </label>
            <label class="cursor-pointer">
              <input class="peer hidden" name="primaryIntent" type="radio" value="resale">
              <div class="flex flex-col items-center justify-center p-4 border-2 border-outline-variant rounded-xl
                          peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary
                          text-on-surface-variant hover:bg-mist/5 transition-all">
                <span class="material-symbols-outlined text-2xl mb-1">sell</span>
                <span class="font-headline font-semibold text-sm">Resale</span>
              </div>
            </label>
          </div>
        </div>

        <!-- Lead Name + Lead Mobile -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-on-surface" for="leadName">Lead Name <span class="text-accent">*</span></label>
            <input id="leadName" type="text" required placeholder="Full name of prospect"
              class="border border-outline-variant rounded-lg px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-on-surface" for="leadMobile">Lead Mobile <span class="text-accent">*</span></label>
            <input id="leadMobile" type="tel" required placeholder="10-digit mobile number"
              class="border border-outline-variant rounded-lg px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
          </div>
        </div>

        <!-- Project + Property Type -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-on-surface" for="project">Project Interested In <span class="text-accent">*</span></label>
            <select id="project" required
              class="border border-outline-variant rounded-lg px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20 appearance-none pr-10">
              <option value="">Select a Project</option>
            </select>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-semibold text-on-surface" for="propertyType">Property Type <span class="text-accent">*</span></label>
            <select id="propertyType" required
              class="border border-outline-variant rounded-lg px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20 appearance-none pr-10">
              <option value="">Select Property Type</option>
              <option value="apartment">Apartment</option>
              <option value="plot">Plot</option>
              <option value="villa">Villa</option>
            </select>
          </div>
        </div>

        <!-- Budget Toggles -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-on-surface">Budget Range</label>
          <div id="budgetToggles" class="flex flex-wrap gap-2">
            <!-- populated by JS -->
          </div>
          <input type="hidden" id="budget" value="">
        </div>

        <!-- BHK Toggles -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-on-surface">BHK Requirement</label>
          <div class="flex gap-2">
            <label class="flex-1 cursor-pointer">
              <input class="hidden peer" name="bhk" type="radio" value="2">
              <div class="text-center py-2.5 border border-outline-variant rounded-lg text-sm font-bold text-on-surface-variant
                          peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary
                          hover:bg-mist/10 transition-all">2 BHK</div>
            </label>
            <label class="flex-1 cursor-pointer">
              <input class="hidden peer" name="bhk" type="radio" value="3">
              <div class="text-center py-2.5 border border-outline-variant rounded-lg text-sm font-bold text-on-surface-variant
                          peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary
                          hover:bg-mist/10 transition-all">3 BHK</div>
            </label>
            <label class="flex-1 cursor-pointer">
              <input class="hidden peer" name="bhk" type="radio" value="4">
              <div class="text-center py-2.5 border border-outline-variant rounded-lg text-sm font-bold text-on-surface-variant
                          peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary
                          hover:bg-mist/10 transition-all">4+ BHK</div>
            </label>
          </div>
        </div>

        <!-- Additional Notes -->
        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-on-surface" for="requirement">Additional Notes</label>
          <textarea id="requirement" rows="3" placeholder="Any preferences, constraints, or special requirements…"
            class="border border-outline-variant rounded-lg px-4 py-3 text-sm outline-none transition-all focus:border-primary focus:ring-1 focus:ring-primary/20 resize-none"></textarea>
        </div>

        <!-- Submit -->
        <div class="pt-1">
          <button type="submit"
            class="w-full h-12 bg-primary text-white font-headline font-bold rounded-xl hover:bg-primary/90 active:scale-[0.99] transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
            Review &amp; Submit
            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
          </button>
        </div>

      </form>
    </div>
  </section>

  <!-- ── STEP 2: REVIEW ── -->
  <section id="step2" class="hidden w-full max-w-[600px] bg-white rounded-2xl shadow-[0_10px_40px_rgba(100,64,162,0.10)] border border-primary/5 overflow-hidden">

    <div class="bg-primary px-6 md:px-8 py-6">
      <h1 class="text-2xl font-headline font-bold text-white">Review Your Submission</h1>
      <p class="text-white/70 text-sm mt-0.5">Confirm the details before registering this lead.</p>
    </div>

    <div class="px-6 md:px-8 pt-6 pb-8 space-y-5">

      <div id="reviewCpStrip"></div>

      <div id="reviewGrid" class="rounded-xl border border-outline-variant/40 overflow-hidden divide-y divide-outline-variant/25 text-sm"></div>

      <div class="flex gap-3 pt-1">
        <button id="editBtn" type="button"
          class="flex items-center gap-1.5 h-12 border-2 border-primary/20 text-primary font-bold rounded-xl px-5 hover:bg-primary/5 transition-all text-sm">
          <span class="material-symbols-outlined text-[18px]">arrow_back</span>Edit
        </button>
        <button id="confirmBtn" type="button"
          class="flex-1 h-12 bg-primary text-white font-headline font-bold rounded-xl hover:bg-primary/90 active:scale-[0.99] transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2 text-sm">
          <span class="material-symbols-outlined text-[18px]">check_circle</span>Confirm &amp; Submit
        </button>
      </div>

    </div>
  </section>

  <div class="hidden xl:block fixed left-10 bottom-10 opacity-[0.06] pointer-events-none text-primary">
    <span class="material-symbols-outlined text-[120px]">assured_workload</span>
  </div>
</main>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbznrTqcQpf-pdVB4lByi0nCBzOU7Qx5qV3bBF2DiB-swQHcfv7NeswVToA32VAf42-YyA/exec';

// Edit this mapping to control which projects appear for each budget toggle.
const BUDGET_PROJECT_MAP = {
  '45k+':  ['horizon', 'ethos', 'breeze'],
  '55k+':  ['ethos', 'breeze', 'greens'],
  '70k+':  ['greens', 'novus', 'eden'],
  '1l+':   ['novus', 'eden', 'trails', 'season'],
  '1cr+':  ['horizon', 'ethos', 'breeze', 'greens'],
  '2cr+':  ['ethos', 'greens', 'novus', 'eden'],
  '3cr+':  ['novus', 'eden', 'trails'],
  '5cr+':  ['trails', 'season', 'wintersun'],
  '10cr+': ['season', 'wintersun'],
};

const ALL_PROJECTS = [
  { value: 'horizon',   label: 'Century Horizon' },
  { value: 'ethos',     label: 'Century Ethos' },
  { value: 'breeze',    label: 'Century Breeze' },
  { value: 'greens',    label: 'Century Greens' },
  { value: 'novus',     label: 'Century Novus' },
  { value: 'eden',      label: 'Century Eden' },
  { value: 'trails',    label: 'Century Trails' },
  { value: 'season',    label: 'Century Season' },
  { value: 'wintersun', label: 'Century Wintersun' },
];

const BUDGET_OPTIONS = {
  rent:   [
    { value: '45k+', label: '₹45k+' },
    { value: '55k+', label: '₹55k+' },
    { value: '70k+', label: '₹70k+' },
    { value: '1l+',  label: '₹1L+' },
  ],
  resale: [
    { value: '1cr+',  label: '₹1 Cr+' },
    { value: '2cr+',  label: '₹2 Cr+' },
    { value: '3cr+',  label: '₹3 Cr+' },
    { value: '5cr+',  label: '₹5 Cr+' },
    { value: '10cr+', label: '₹10 Cr+' },
  ],
};

// ── LEAD ID ───────────────────────────────────────────────────────────────────

const YEAR = new Date().getFullYear();
const ID_KEY = `ca_lead_seq_${YEAR}`;

function peekLeadId() {
  const n = parseInt(localStorage.getItem(ID_KEY) || '0', 10) + 1;
  return `CA-${YEAR}-${String(n).padStart(3, '0')}`;
}

function consumeLeadId() {
  const n = parseInt(localStorage.getItem(ID_KEY) || '0', 10) + 1;
  localStorage.setItem(ID_KEY, n);
  return `CA-${YEAR}-${String(n).padStart(3, '0')}`;
}

document.getElementById('leadId').value = peekLeadId();

// ── TIMESTAMP ─────────────────────────────────────────────────────────────────

function updateTime() {
  const el = document.getElementById('timestamp');
  if (el) el.value = new Date().toLocaleString('en-IN', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true,
  });
}
setInterval(updateTime, 1000);
updateTime();

// ── CP IDENTITY ───────────────────────────────────────────────────────────────

function getCp() {
  try { return JSON.parse(localStorage.getItem('ca_cp') || 'null'); } catch { return null; }
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function cpStripHTML(cp) {
  return `
    <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-primary/15 text-primary flex items-center justify-center font-headline font-bold text-sm flex-shrink-0 select-none">
        ${initials(cp.name)}
      </div>
      <div class="flex-grow min-w-0">
        <p class="font-headline font-semibold text-on-surface text-sm">${cp.name}</p>
        <p class="text-xs text-on-surface-variant mt-0.5 truncate">${cp.mobile} · ${cp.email}</p>
      </div>
      <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
        <div class="flex items-center gap-1 text-[11px] text-on-surface-variant bg-white border border-outline-variant rounded-full px-2.5 py-0.5">
          <span class="material-symbols-outlined text-[13px]" style="font-variation-settings:'FILL' 1">lock</span>
          <span class="font-bold">You</span>
        </div>
        <button onclick="resetCp()" class="text-[11px] text-primary/50 hover:text-accent transition-colors underline">Not you?</button>
      </div>
    </div>`;
}

function showCpStrip(cp) {
  document.getElementById('cpSetup').classList.add('hidden');
  const el = document.getElementById('cpStrip');
  el.innerHTML = cpStripHTML(cp);
  el.classList.remove('hidden');
}

function showCpSetup() {
  document.getElementById('cpStrip').classList.add('hidden');
  document.getElementById('cpSetup').classList.remove('hidden');
}

window.resetCp = function() {
  localStorage.removeItem('ca_cp');
  showCpSetup();
};

const existingCp = getCp();
if (existingCp) showCpStrip(existingCp); else showCpSetup();

document.getElementById('saveCpBtn').addEventListener('click', () => {
  const name   = document.getElementById('sName').value.trim();
  const mobile = document.getElementById('sMobile').value.replace(/\D/g, '');
  const email  = document.getElementById('sEmail').value.trim();
  if (!name) { document.getElementById('sName').focus(); return; }
  if (mobile.length !== 10) { showErr(document.getElementById('sMobile'), 'Enter a valid 10-digit mobile number'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr(document.getElementById('sEmail'), 'Enter a valid email address'); return; }
  const cp = { name, mobile, email };
  localStorage.setItem('ca_cp', JSON.stringify(cp));
  showCpStrip(cp);
});

document.getElementById('sMobile').addEventListener('blur', function() {
  const d = this.value.replace(/\D/g,'');
  if (d && d.length !== 10) showErr(this, 'Enter a valid 10-digit mobile number');
  else clearErr(this);
});
document.getElementById('sEmail').addEventListener('blur', function() {
  if (this.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)) showErr(this, 'Enter a valid email address');
  else clearErr(this);
});

// ── FIELD VALIDATION ──────────────────────────────────────────────────────────

function showErr(input, msg) {
  input.style.borderColor = '#ef4444';
  input.style.boxShadow   = '0 0 0 1.5px #ef4444';
  let p = input.parentNode.querySelector('.ferr');
  if (!p) {
    p = document.createElement('p');
    p.className = 'ferr text-red-500 text-xs mt-1 flex items-center gap-1';
    input.parentNode.appendChild(p);
  }
  p.innerHTML = `<span class="material-symbols-outlined text-[13px]" style="font-variation-settings:'FILL' 1">error</span>${msg}`;
}

function clearErr(input) {
  input.style.borderColor = '';
  input.style.boxShadow   = '';
  const p = input.parentNode.querySelector('.ferr');
  if (p) p.remove();
}

function validateMobile(input) {
  const d = input.value.replace(/\D/g, '');
  if (!input.value) { clearErr(input); return true; }
  if (d.length !== 10) { showErr(input, 'Enter a valid 10-digit mobile number'); return false; }
  clearErr(input); return true;
}

const leadMobileEl = document.getElementById('leadMobile');
leadMobileEl.addEventListener('blur', () => validateMobile(leadMobileEl));
leadMobileEl.addEventListener('input', () => {
  if (leadMobileEl.value.replace(/\D/g,'').length === 10) clearErr(leadMobileEl);
});

// ── BUDGET TOGGLES ────────────────────────────────────────────────────────────

const budgetContainer = document.getElementById('budgetToggles');
const budgetHidden    = document.getElementById('budget');

function renderBudgetToggles(intent) {
  const opts = BUDGET_OPTIONS[intent] || BUDGET_OPTIONS.resale;
  budgetHidden.value = '';
  budgetContainer.innerHTML = '';
  opts.forEach(opt => {
    const lbl = document.createElement('label');
    lbl.className = 'cursor-pointer';
    lbl.innerHTML = `
      <input type="radio" name="budgetToggle" value="${opt.value}" class="hidden peer">
      <div class="px-4 py-2 border border-outline-variant rounded-lg text-sm font-semibold text-on-surface-variant select-none
                  peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary
                  hover:bg-mist/10 transition-all">${opt.label}</div>`;
    lbl.querySelector('input').addEventListener('change', e => {
      budgetHidden.value = e.target.value;
      filterProjects(e.target.value);
    });
    budgetContainer.appendChild(lbl);
  });
}

// ── PROJECT FILTER ────────────────────────────────────────────────────────────

function populateProjects(allowed) {
  const sel = document.getElementById('project');
  const prev = sel.value;
  sel.innerHTML = '<option value="">Select a Project</option>';
  const list = allowed ? ALL_PROJECTS.filter(p => allowed.includes(p.value)) : ALL_PROJECTS;
  list.forEach(p => {
    const o = document.createElement('option');
    o.value = p.value; o.textContent = p.label;
    sel.appendChild(o);
  });
  if (list.find(p => p.value === prev)) sel.value = prev;
}

function filterProjects(budgetVal) {
  populateProjects(budgetVal ? BUDGET_PROJECT_MAP[budgetVal] : null);
}

populateProjects(null);
renderBudgetToggles('resale');

document.querySelectorAll('input[name="primaryIntent"]').forEach(r => {
  r.addEventListener('change', e => {
    renderBudgetToggles(e.target.value);
    populateProjects(null);
  });
});

// ── STEPPER ───────────────────────────────────────────────────────────────────

function setStep(n) {
  [1, 2, 3].forEach(i => {
    const c = document.getElementById(`sc${i}`);
    const l = document.getElementById(`sl${i}`);
    if (i < n) {
      c.className = 'w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center shadow-lg transition-all duration-300';
      c.innerHTML = `<span class="material-symbols-outlined text-[15px]" style="font-variation-settings:'FILL' 1">check_circle</span>`;
      if (l) l.className = 'text-xs font-bold text-primary uppercase tracking-tighter';
    } else if (i === n) {
      c.className = 'w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold text-sm shadow-lg transition-all duration-300';
      c.textContent = i;
      if (l) l.className = 'text-xs font-bold text-primary uppercase tracking-tighter';
    } else {
      c.className = 'w-10 h-10 rounded-full bg-white border-2 border-primary/20 text-on-surface-variant flex items-center justify-center font-bold text-sm transition-all duration-300';
      c.textContent = i;
      if (l) l.className = 'text-xs font-bold text-on-surface-variant uppercase tracking-tighter';
    }
  });
  document.getElementById('con1').style.background = n > 1 ? '#6440A2' : 'rgba(100,64,162,.2)';
  document.getElementById('con2').style.background = n > 2 ? '#6440A2' : 'rgba(100,64,162,.2)';

  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  if (n === 1) {
    s2.classList.add('hidden');
    s1.classList.remove('hidden');
    s1.classList.add('panel-enter');
  } else {
    s1.classList.add('hidden');
    s2.classList.remove('hidden');
    s2.classList.add('panel-enter');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── REVIEW PANEL ─────────────────────────────────────────────────────────────

function buildReview() {
  const cp = getCp() || {};
  const reviewCpStrip = document.getElementById('reviewCpStrip');
  reviewCpStrip.innerHTML = cp.name ? cpStripHTML(cp) : '';

  const projEl = document.getElementById('project');
  const propEl = document.getElementById('propertyType');
  const intent = document.querySelector('input[name="primaryIntent"]:checked')?.value || '';
  const bhk    = document.querySelector('input[name="bhk"]:checked')?.value || '';

  const rows = [
    ['Lead ID',        document.getElementById('leadId').value],
    ['Date & Time',    document.getElementById('timestamp').value],
    ['Intent',         intent ? intent.charAt(0).toUpperCase() + intent.slice(1) : '—'],
    ['Lead Name',      document.getElementById('leadName').value   || '—'],
    ['Lead Mobile',    document.getElementById('leadMobile').value || '—'],
    ['Project',        projEl.options[projEl.selectedIndex]?.text  || '—'],
    ['Property Type',  propEl.options[propEl.selectedIndex]?.text  || '—'],
    ['Budget',         budgetHidden.value || '—'],
    ['BHK',            bhk ? bhk + ' BHK' : '—'],
    ['Notes',          document.getElementById('requirement').value || '—'],
  ];

  document.getElementById('reviewGrid').innerHTML = rows.map(([k, v]) => `
    <div class="flex items-start gap-4 px-4 py-3 hover:bg-slate-50 transition-colors">
      <span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-wider w-24 flex-shrink-0 pt-0.5">${k}</span>
      <span class="text-sm text-on-surface">${v}</span>
    </div>`).join('');
}

// ── FORM SUBMIT → STEP 2 ─────────────────────────────────────────────────────

document.getElementById('leadForm').addEventListener('submit', e => {
  e.preventDefault();

  if (!getCp()) {
    showCpSetup();
    document.getElementById('sName').focus();
    return;
  }

  if (!document.querySelector('input[name="primaryIntent"]:checked')) {
    alert('Please select a Primary Intent (Rent or Resale).');
    return;
  }

  const mobileOk = validateMobile(leadMobileEl);
  if (!mobileOk) { leadMobileEl.focus(); return; }

  const req = ['leadName','leadMobile','project','propertyType'];
  let bad = null;
  req.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      el.style.borderColor = '#ef4444';
      el.style.boxShadow   = '0 0 0 1.5px #ef4444';
      if (!bad) bad = el;
    } else {
      el.style.borderColor = '';
      el.style.boxShadow   = '';
    }
  });
  if (bad) { bad.focus(); return; }

  buildReview();
  setStep(2);
});

// ── EDIT BUTTON ───────────────────────────────────────────────────────────────

document.getElementById('editBtn').addEventListener('click', () => setStep(1));

// ── CONFIRM & SUBMIT ──────────────────────────────────────────────────────────

document.getElementById('confirmBtn').addEventListener('click', () => {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full inline-block mr-2"></span>Submitting…';

  const cp = getCp() || {};
  const leadId = consumeLeadId();

  const payload = {
    leadId,
    timestamp:    document.getElementById('timestamp').value,
    cpName:       cp.name   || '',
    cpMobile:     cp.mobile || '',
    cpEmail:      cp.email  || '',
    intent:       document.querySelector('input[name="primaryIntent"]:checked')?.value || '',
    leadName:     document.getElementById('leadName').value,
    leadMobile:   document.getElementById('leadMobile').value,
    project:      document.getElementById('project').value,
    propertyType: document.getElementById('propertyType').value,
    budget:       budgetHidden.value,
    bhk:          document.querySelector('input[name="bhk"]:checked')?.value || '',
    requirements: document.getElementById('requirement').value,
  };

  const go = () => window.location.href = 'success.html?id=' + encodeURIComponent(leadId);

  fetch(SHEET_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  }).finally(go);
});
</script>
